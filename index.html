<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OOHA...!! - Hidden Thoughts</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
    <!-- Make sure your image file is exactly named "wmremove-transformed.png" and is in the same folder -->
    <img src="displaypicture.png" alt="OOHA...!! Logo" class="brand-logo-img">
</header>

        <main>
            <section class="search-section">
                <input type="text" id="search-name" placeholder="Enter First Name...">
                
                <div class="location-dropdowns">
                    <div class="autocomplete-wrapper">
                        <input type="text" id="country-input" placeholder="Loading...">
                        <div id="country-list" class="autocomplete-list"></div>
                    </div>
                    
                    <div class="autocomplete-wrapper">
                        <input type="text" id="state-input" placeholder="Select Country First..." disabled>
                        <div id="state-list" class="autocomplete-list"></div>
                    </div>
                    
                    <div class="autocomplete-wrapper">
                        <input type="text" id="city-input" placeholder="Select State First..." disabled>
                        <div id="city-list" class="autocomplete-list"></div>
                    </div>
                </div>

                <button id="lookup-btn" class="primary-btn">Reveal OOHA...!!</button>
            </section>

            <button id="leave-ooha-btn" class="secondary-btn">Leave an OOHA...!!</button>

            <section id="results-section" class="results-container"></section>
        </main>
    </div>

    <div id="social-ticker" class="social-ticker hidden"></div>

    <div id="export-container" style="position: absolute; top: -9999px; left: -9999px;"></div>

    <div id="ooha-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div id="modal-form-area">
                <h2>Leave an OOHA...!!</h2>
                <p class="modal-subtitle">Share your secret thought about someone.</p>
                
                <input type="text" id="target-name" placeholder="Their First Name...">
                
                <div class="form-group autocomplete-wrapper">
                    <input type="text" id="modal-country" placeholder="Loading...">
                    <div id="modal-country-list" class="autocomplete-list"></div>
                </div>
                <div class="form-group autocomplete-wrapper">
                    <input type="text" id="modal-state" placeholder="Select Country First..." disabled>
                    <div id="modal-state-list" class="autocomplete-list"></div>
                </div>
                <div class="form-group autocomplete-wrapper">
                    <input type="text" id="modal-city" placeholder="Select State First..." disabled>
                    <div id="modal-city-list" class="autocomplete-list"></div>
                </div>

                <div class="form-group">
                    <input type="text" id="sender-name" placeholder="Your Name/Alias (Leave blank to hide)">
                </div>

                <div class="form-group">
                    <select id="vibe-select" class="vibe-dropdown">
                        <option value="" disabled selected>Select the Vibe...</option>
                        <option value="🔥 Confession">🔥 Confession</option>
                        <option value="🖤 Secret Admirer">🖤 Secret Admirer</option>
                        <option value="🐍 Betrayal">🐍 Betrayal</option>
                        <option value="👑 Respect">👑 Respect</option>
                        <option value="👀 Just Spying">👀 Just Spying</option>
                    </select>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="self-destruct-check">
                    <label for="self-destruct-check">💣 Make this OOHA self-destruct in 24 hours</label>
                </div>

                <textarea id="ooha-text" rows="4" placeholder="Type your secret thought here..."></textarea>
                <button id="submit-ooha-btn" class="primary-btn">Submit OOHA...!!</button>
            </div>
            
            <div id="success-message" class="hidden">
                <h2 style="color: var(--gold-primary);">Locked Away!</h2>
                <p>Your secret is safe in the vault.</p>
            </div>
        </div>
    </div>
    <script type="module" src="script.js?v=2"></script>
    <footer style="margin-top: 50px; padding: 20px; text-align: center; border-top: 1px solid #242730;">
        <p style="color: #888c96; font-size: 0.75rem; margin-bottom: 10px;">
            &copy; 2026 OOHA...!! All rights reserved. 
            <br> By using OOHA...!!, you agree to our Privacy Policy.
        </p>
        <p style="color: #d4af37; font-size: 0.8rem; font-weight: bold;">
            Need support? Contact: <a href="mailto:theoohavault@gmail.com" style="color: #d4af37;">theoohavault@gmail.com</a>
        </p>
    </footer>
</body>
</html>
