<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"OOHA" - The Secret Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo-text">"OOHA"</h1>
            <p class="tagline">Uncover the hidden thoughts...</p>
        </header>

        <main>
            <!-- Search Section -->
            <div class="search-section">
                <input type="text" id="search-name" placeholder="Enter First Name...">
                
                <div class="location-dropdowns">
                    <div class="autocomplete-wrapper">
                        <input type="text" id="country-input" placeholder="Loading Countries..." autocomplete="off">
                        <div id="country-list" class="autocomplete-list"></div>
                    </div>

                    <div class="autocomplete-wrapper">
                        <input type="text" id="state-input" placeholder="Select Country First..." autocomplete="off" disabled>
                        <div id="state-list" class="autocomplete-list"></div>
                    </div>

                    <div class="autocomplete-wrapper">
                        <input type="text" id="city-input" placeholder="Select State First..." autocomplete="off" disabled>
                        <div id="city-list" class="autocomplete-list"></div>
                    </div>
                </div>

                <button id="lookup-btn" class="primary-btn">Reveal "Ooha"</button>
            </div>

            <!-- Action Button -->
            <div class="action-section">
                <button id="leave-ooha-btn" class="secondary-btn">Leave an "Ooha"</button>
            </div>

            <!-- Results Section -->
            <div id="results-section" class="results-container"></div>
        </main>
    </div>

    <!-- Leave an Ooha Form (Hidden Modal) -->
    <div id="ooha-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div class="form-group">
             <label>Your Name/Alias (Optional)</label>
             <input type="text" id="sender-name" placeholder="Leave blank to be completely anonymous...">
            </div>
            <div id="modal-form-area">
                <h2>Leave an "Ooha"</h2>
                <p class="modal-subtitle">Share your secret thought about someone.</p>
                
                <input type="text" id="target-name" placeholder="Their First Name...">
                
                <!-- Same Location Logic for Modal -->
                <div class="location-dropdowns">
                    <div class="autocomplete-wrapper">
                        <input type="text" id="modal-country" placeholder="Select Country..." autocomplete="off">
                        <div id="modal-country-list" class="autocomplete-list"></div>
                    </div>
                    <div class="autocomplete-wrapper">
                        <input type="text" id="modal-state" placeholder="Select State..." autocomplete="off" disabled>
                        <div id="modal-state-list" class="autocomplete-list"></div>
                    </div>
                    <div class="autocomplete-wrapper">
                        <input type="text" id="modal-city" placeholder="Select City..." autocomplete="off" disabled>
                        <div id="modal-city-list" class="autocomplete-list"></div>
                    </div>
                </div>

                <textarea id="ooha-text" rows="3" placeholder="Type your secret thought here..."></textarea>
                <button id="submit-ooha-btn" class="primary-btn">Submit "Ooha"</button>
            </div>
            
            <!-- Success Message (Hidden by default) -->
            <div id="success-message" class="hidden">
                <h3 style="color: var(--gold-primary); margin-bottom: 10px;">"Ooha" Dropped Successfully! 🤫</h3>
                <p style="color: var(--text-muted);">Your secret is safe with us. Let's see if they find it!</p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
